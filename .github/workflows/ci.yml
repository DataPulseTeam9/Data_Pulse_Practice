name: DataPulse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ============================================================
  # Job 1: Pre-commit (same checks as local hooks)
  # ============================================================
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: pre-commit/action@v3.0.1

  # ============================================================
  # Job 2: Lint
  # Fixed: path was backend/app (doesn't exist) → backend/
  # Fixed: reads rules from setup.cfg automatically
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install linters
        run: pip install flake8 black isort
      - name: Black
        run: black --check backend/
      - name: Isort
        run: isort --check-only backend/
      - name: Flake8
        run: flake8 backend/
        # reads max-line-length, ignores, excludes from setup.cfg

  # ============================================================
  # Job 3: Backend Tests
  # Fixed: Django uses manage.py test or pytest-django
  # Fixed: DJANGO_SETTINGS_MODULE added
  # Fixed: coverage path is backend/ not backend/app
  # Fixed: added migrate step before tests
  # ============================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: datapulse_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d datapulse_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest-cov

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/datapulse_test
          SECRET_KEY: ci-test-secret-key
          DJANGO_SETTINGS_MODULE: datapulse.settings.dev
          DEBUG: "True"
        run: |
          cd backend && python manage.py migrate --noinput

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/datapulse_test
          SECRET_KEY: ci-test-secret-key
          DJANGO_SETTINGS_MODULE: datapulse.settings.dev
          DEBUG: "True"
        run: |
          cd backend && pytest tests/ -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60 \
            --ignore=backendv1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ============================================================
  # Job 4: Security Scan
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install safety
        run: pip install safety
      - name: Scan dependencies
        run: safety check -r backend/requirements.txt --continue-on-error

  # ============================================================
  # Job 5: Docker Build
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: datapulse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 6: Integration Test
  # Fixed: .env now includes all required vars for docker-compose
  # Fixed: health check URL matches Django (trailing slash)
  # Fixed: smoke test hits correct endpoints
  # Fixed: docs endpoint is swagger not /docs
  # Fixed: analytics DB vars added
  # ============================================================
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env << EOF
          POSTGRES_DB=datapulse
          POSTGRES_USER=datapulse
          POSTGRES_PASSWORD=datapulse
          DATABASE_URL=postgresql://datapulse:datapulse@db:5432/datapulse
          ANALYTICS_DB=datapulse_analytics
          ANALYTICS_USER=analytics
          ANALYTICS_PASSWORD=analytics
          TARGET_DB_URL=postgresql://analytics:analytics@db-analytics:5432/datapulse_analytics
          SECRET_KEY=ci-secret-key
          DJANGO_SETTINGS_MODULE=datapulse.settings.dev
          DEBUG=True
          ACCESS_TOKEN_EXPIRE_MINUTES=1440
          GRAFANA_USER=admin
          GRAFANA_PASSWORD=datapulse123
          EOF

      - name: Start containers
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health/; then
              echo "Backend is healthy"
              break
            fi
            echo "Attempt $i/30 — retrying in 5s..."
            sleep 5
          done

      - name: Smoke tests
        run: |
          curl -sf http://localhost:8000/health/
          echo "Health check passed"
          curl -sf http://localhost:8000/api/schema/swagger-ui/ > /dev/null
          echo "Swagger UI accessible"
          echo "All smoke tests passed"

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== BACKEND LOGS ==="
          docker compose logs backend
          echo "=== DB LOGS ==="
          docker compose logs db

      - name: Teardown
        if: always()
        run: docker compose down -v
