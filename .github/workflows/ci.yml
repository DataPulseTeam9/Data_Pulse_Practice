name:  DataPulse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ============================================================
  # Job 1: Pre-commit (same checks as local hooks)
  # ============================================================
  pre-commit:
    name: 🪝 Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: pre-commit/action@v3.0.1

  # ============================================================
  # Job 2: Lint
  # ============================================================
  lint:
    name:  Lint
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install flake8 black isort
      - run: flake8 backend/app --max-line-length=120
      - run: black --check backend/app
      - run: isort --check-only backend/app

  # ============================================================
  # Job 3: Backend Tests
  # ============================================================
  test-backend:
    name:  Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: datapulse_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d datapulse_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r backend/requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/datapulse_test
          SECRET_KEY: ci-test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          ENV: test
        run: |
          cd backend && pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ============================================================
  # Job 4: Security Scan
  # ============================================================
  security:
    name:  Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install safety
      - run: safety check -r backend/requirements.txt --continue-on-error

  # ============================================================
  # Job 5: Docker Build
  # ============================================================
  docker-build:
    name:  Docker Build
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: datapulse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 6: Integration Test
  # ============================================================
  integration:
    name:  Integration Test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - name: Create .env
        run: |
          cat > .env << EOF
          POSTGRES_DB=datapulse
          POSTGRES_USER=datapulse_user
          POSTGRES_PASSWORD=ci_password
          DATABASE_URL=postgresql://datapulse_user:ci_password@db:5432/datapulse
          SECRET_KEY=ci-secret-key
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=1440
          ENV=test
          EOF
      - run: docker-compose up -d --build
      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health; then
              echo " API healthy"; break
            fi
            echo "Waiting... ($i/30)"; sleep 5
          done
      - name: Smoke tests
        run: |
          curl -sf http://localhost:8000/health | grep "ok"
          curl -sf http://localhost:8000/docs > /dev/null
          echo " Smoke tests passed"
      - if: failure()
        run: docker-compose logs
      - if: always()
        run: docker-compose down -v
