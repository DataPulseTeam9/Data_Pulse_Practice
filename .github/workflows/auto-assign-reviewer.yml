name:  Auto Assign Reviewer

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  assign:
    name: Assign reviewer
    runs-on: ubuntu-latest

    steps:
      - name: Assign reviewer based on PR author
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;

            const reviewerMap = {
              "lubandi":        "IshimweDiane",      // Joseph to Diane
              "IshimweDiane":   "lubandi",            // Diane to Joseph
              "JoeBright1619":  "Kalisha1234",        // Bright to Bernice
              "Kalisha1234":    "JoeBright1619",      // Bernice to Bright
              "Zaina-M":        "Asheryram", // Zainab to Yram 
              "Asheryram": "lubandi",        // Yram to Joseph
            };

            const reviewer = reviewerMap[author];

            if (reviewer) {
              try {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  reviewers: [reviewer]
                });
                console.log(` Assigned @${reviewer} to review @${author}'s PR`);
              } catch (error) {
                console.log(` Could not assign ${reviewer}: ${error.message}`);
              }
            } else {
              console.log(` No reviewer mapped for @${author} — assign manually`);
            }
