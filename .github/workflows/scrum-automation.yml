name:  Scrum Board Automation

on:
  pull_request:
    types: [opened, ready_for_review, closed]
  issues:
    types: [assigned, closed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:

  # ============================================================
  # When a PR is opened → add label "in-review"
  # ============================================================
  pr-opened:
    name: PR Opened → In Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'

    steps:
      - name: Label PR as in-review
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['status: in-review']
            });
            console.log(' Labeled PR as in-review');

  # ============================================================
  # When PR is merged → label linked issue as done
  # ============================================================
  pr-merged:
    name: PR Merged → Done
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true

    steps:
      - name: Comment on merged PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: ' This PR has been merged. Move your task to **Done** on the project board.'
            });

  # ============================================================
  # When review requests changes → label PR as needs-work
  # ============================================================
  review-changes-requested:
    name: Review → Needs Work
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'

    steps:
      - name: Label PR as needs-work
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const reviewer = context.payload.review.user.login;

            // Remove in-review label, add needs-work
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: 'status: in-review'
              });
            } catch (e) { /* label might not exist */ }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['status: needs-work']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `@${pr.user.login} — @${reviewer} has requested changes. Please update your PR and re-request review.`
            });

  # ============================================================
  # When review approves → label PR as approved
  # ============================================================
  review-approved:
    name: Review → Approved
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'

    steps:
      - name: Label PR as approved
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const reviewer = context.payload.review.user.login;

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: 'status: in-review'
              });
            } catch (e) { /* label might not exist */ }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['status: approved']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `@${reviewer} has approved the PR. Ready to merge!`
            });
