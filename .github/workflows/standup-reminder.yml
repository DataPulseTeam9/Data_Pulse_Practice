name:  Daily Standup Reminder

on:
  schedule:
    - cron: "0 7 * * 1-5"   # 7am every weekday (UTC)
  workflow_dispatch:          # allow manual trigger

permissions:
  issues: write

jobs:
  standup:
    name: Post standup reminder
    runs-on: ubuntu-latest

    steps:
      - name: Create standup issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const day = new Date().toLocaleDateString('en-US', { weekday: 'long' });

            const body = `
            ##  Daily Standup — ${day} ${today}

            Each team member replies to this issue with:

            **1. What did I complete yesterday?**
            (Link the PR or issue you finished)

            **2.  What am I working on today?**
            (Link your current task on the project board)

            **3.  Any blockers?**
            (Tag @Asheryram for DevOps issues, or the relevant teammate)

            ---
            > Move your tasks on the [Project Board](../../projects) to reflect your current status.
            > Close this issue once standup is done.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: ` Standup — ${today}`,
              body: body,
              labels: ['standup'],
              assignees: [
                'lubandi',
                'IshimweDiane',
                'JoeBright1619',
                'Kalisha1234',
                'Zaina-M',
                'Asheryram'
              ]
            });
