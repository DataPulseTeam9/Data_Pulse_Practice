# =============================================================
# DataPulse — Team 9
# Services:
#   - db             (PostgreSQL operational)
#   - db-analytics   (PostgreSQL analytics/ETL)
#   - backend        (Django + Gunicorn)
#   - etl            (Data Engineering pipeline)
#   - streamlit      (Data Engineering dashboard)
#   - prometheus     (Metrics collection)
#   - grafana        (Metrics visualization)
# =============================================================

services:

  # -----------------------------------------------------------
  # Operational Database (used by Django)
  # -----------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: datapulse-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datapulse}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - datapulse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datapulse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Analytics Database (used by ETL pipeline + Streamlit)
  # -----------------------------------------------------------
  db-analytics:
    image: postgres:15-alpine
    container_name: datapulse-db-analytics
    environment:
      POSTGRES_USER: ${ANALYTICS_USER:-analytics}
      POSTGRES_PASSWORD: ${ANALYTICS_PASSWORD:-analytics}
      POSTGRES_DB: ${ANALYTICS_DB:-datapulse_analytics}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_analytics:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - datapulse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_USER:-analytics}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Django Backend
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://datapulse:datapulse@db:5432/datapulse}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-datapulse.settings.dev}
      DEBUG: ${DEBUG:-True}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_LOG_LEVEL: ${GUNICORN_LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - datapulse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------------------------------------------------
  # ETL Pipeline (Data Engineering)
  # -----------------------------------------------------------
  etl:
    build:
      context: .
      dockerfile: devops/Dockerfile.pipeline
    container_name: datapulse-etl
    environment:
      SOURCE_DB_URL: ${DATABASE_URL:-postgresql://datapulse:datapulse@db:5432/datapulse}
      TARGET_DB_URL: ${TARGET_DB_URL:-postgresql://analytics:analytics@db-analytics:5432/datapulse_analytics}
    depends_on:
      db:
        condition: service_healthy
      db-analytics:
        condition: service_healthy
    restart: on-failure
    networks:
      - datapulse-network

  # -----------------------------------------------------------
  # Streamlit Dashboard (Data Engineering)
  # -----------------------------------------------------------
  streamlit:
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: datapulse-streamlit
    environment:
      TARGET_DB_URL: ${TARGET_DB_URL:-postgresql://analytics:analytics@db-analytics:5432/datapulse_analytics}
    ports:
      - "8501:8501"
    depends_on:
      db-analytics:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - datapulse-network

  # -----------------------------------------------------------
  # Prometheus (Metrics Collection)
  # -----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: datapulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./devops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - datapulse-network

  # -----------------------------------------------------------
  # Grafana (Metrics Visualization)
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: datapulse-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-datapulse123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./devops/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - datapulse-network

# =============================================================
# Volumes
# =============================================================
volumes:
  pgdata:
  pgdata_analytics:
  upload_data:
  prometheus_data:
  grafana_data:

# =============================================================
# Networks
# =============================================================
networks:
  datapulse-network:
    driver: bridge
